name: Build and Release ITU SuperApp

on:
  push:
    paths:
      - 'mobile-app-2/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build APK
        run: |
          chmod +x build_apk.sh
          chmod +x android/gradlew
          ./build_apk.sh

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: itu-superapp-android-apk
          path: ITU.apk

  ios:
    runs-on: macos-latest
    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build IPA (Unsigned)
        run: |
          chmod +x build_ipa.sh
          ./build_ipa.sh

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: itu-superapp-ios-ipa
          path: ITU.ipa

  release:
    needs: [android, ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete existing release and tag
        run: |
          gh release delete latest --yes --cleanup-tag || true
          git push origin :refs/tags/latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: itu-superapp-android-apk

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: itu-superapp-ios-ipa

      - name: Create Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "En son APK ve IPA dosyalarını aşağıda bulabilirsiniz."
          files: |
            ITU.apk
            ITU.ipa
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
